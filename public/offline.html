<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Koneksi Terputus | TraKerja</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/icon.png?v=2">
    <link rel="apple-touch-icon" href="/images/icon.png?v=2">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Plus+Jakarta+Sans:400,500,600,700&display=swap" rel="stylesheet" />
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fafafa;
        }
        .dot-grid {
            background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="antialiased text-zinc-650 flex items-center justify-center min-h-screen relative bg-[#fafafa]">

    <!-- Clean Dot Grid Background -->
    <div class="absolute inset-0 z-0 dot-grid opacity-60 pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-[420px] px-6 py-12 flex flex-col">
        
        <!-- Header -->
        <div class="flex items-center space-x-2.5 mb-6">
            <div class="w-7 h-7 bg-white rounded-lg border border-zinc-200/80 flex items-center justify-center p-1.5 shadow-[0_1px_2px_rgba(0,0,0,0.03)]">
                <img src="/images/icon.png" alt="TraKerja Logo" class="w-full h-full object-contain">
            </div>
            <span class="text-xs font-bold text-zinc-800 tracking-tight">TraKerja</span>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl p-7 sm:p-8 border border-zinc-200/80 shadow-[0_1px_3px_rgba(0,0,0,0.02),0_16px_36px_-6px_rgba(0,0,0,0.03)] relative overflow-hidden">
            
            <!-- Icon -->
            <div class="mb-5 flex items-center justify-start">
                <div class="w-10 h-10 rounded-xl bg-zinc-50 border border-zinc-200/60 flex items-center justify-center text-zinc-400">
                    <i class="ph ph-wifi-slash text-xl"></i>
                </div>
            </div>

            <!-- Title -->
            <div class="mb-3 text-left">
                <span class="inline-block font-mono text-[9px] font-bold text-zinc-400 bg-zinc-100 border border-zinc-200/60 rounded px-1.5 py-0.5 tracking-wider uppercase mb-2.5">
                    OFFLINE
                </span>
                <h1 class="text-lg font-bold text-zinc-800 tracking-tight leading-tight">
                    Koneksi Terputus
                </h1>
            </div>
            
            <!-- Description -->
            <p class="text-[12px] text-zinc-500 font-medium leading-relaxed mb-6 text-left">
                Waduh, sepertinya perangkat Anda sedang tidak terhubung ke internet. Hubungkan kembali koneksi Anda untuk dapat menggunakan seluruh fitur TraKerja.
            </p>
            
            <!-- Actions Buttons -->
            <div class="flex flex-col gap-2">
                <button onclick="window.location.reload()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl transition-all duration-150 font-bold text-xs shadow-xs active:scale-[0.98]">
                    <i class="ph-bold ph-arrow-clockwise text-xs"></i>
                    Segarkan Halaman
                </button>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-6 text-left px-1 flex justify-between items-center text-[9px] font-semibold text-zinc-400">
            <span>TraKerja &copy; <span id="year">2026</span></span>
        </div>
        
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
